<template>
    <lightning-card>
        <div class="slds-align_absolute-center">
            <h1>Select Orders to Return/Exchange</h1>
        </div>

        <div class="slds-p-around_small slds-align_absolute-center">
            <lightning-button 
                label="View My Orders" 
                variant="brand"
                onclick={handleLoadOrdersClick}>
            </lightning-button>
        </div>

        <template if:true={ordersLoaded}>
            <template if:true={orders.length}>
                <div class="slds-p-around_medium slds-grid slds-wrap">
                    <template for:each={getOrdersForTemplate} for:item="order">
                        <div key={order.Id} class="slds-size_1-of-3 slds-p-around_small">
                            <div class="tile" data-id={order.Id} onclick={handleTileClick}>
                                <div class="status-badge">{order.Status__c}</div>
                                <p><b>Order ID:</b> {order.Name}</p>
                                <p><b>Product:</b> {order.displayProductName}</p>
                                <p><b>Date:</b> {order.displayOrderDate}</p>
                                <p><b>Amount Paid:</b> {order.displayRefundAmount}</p>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={orders.length}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:cart" size="large"></lightning-icon>
                    <p>No Orders Found</p>
                </div>
            </template>
        </template>
    </lightning-card>

    <!-- Modal -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container popup">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">
                        Raise a Request for Exchange/Return {selectedOrder.Name}
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <h3 class="section-title">Request Details</h3>

                    <lightning-combobox label="Request Type" name="Request_Type__c"
                        options={requestTypeOptions} value={caseFields.Request_Type__c}
                        onchange={handleChange}></lightning-combobox>

                    <lightning-combobox label="Reason" name="Reason__c"
                        options={reasonOptions} value={caseFields.Reason__c}
                        onchange={handleChange}></lightning-combobox>

                    <template if:true={isReturnRequest}>
                        <lightning-combobox label="Pay To" name="Pay_To__c"
                            options={payToOptions} value={caseFields.Pay_To__c}
                            onchange={handleChange}></lightning-combobox>

                        <lightning-input label="Refund Amount" type="currency"
                            value={selectedOrder.Refund_Amount__c} disabled></lightning-input>
                    </template>

                    <template if:true={isExchangeRequest}>
                        <div class="exchange-box">
                            <p><b>Exchange Product:</b> {selectedOrder.displayProductName}</p>
                            <p class="slds-text-color_weak slds-p-top_xx-small">
                                🔄 Yo! Same item swap initiated — you deserve a fresh drop 💥
                            </p>
                        </div>
                    </template>

                    <!-- Description only if "Others" -->
                    <template if:true={showDescription}>
                        <lightning-textarea label="Comments (Required for Others)"
                            name="Description" value={caseFields.Description}
                            onchange={handleChange} required>
                        </lightning-textarea>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseModal}></lightning-button>
                    <lightning-button variant="brand" label="Submit" onclick={handleSubmitClick}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Confirmation Popup -->
    <template if:true={showConfirmPopup}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container popup">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Confirm Submission</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <p>Please confirm that all details entered are true and accurate.</p>
                    <lightning-input type="checkbox"
                        label="I acknowledge that the details I provided are true"
                        checked={isAcknowledged}
                        onchange={handleAcknowledgeChange}></lightning-input>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={cancelConfirm}></lightning-button>
                    <lightning-button variant="brand" label="Confirm & Submit" onclick={confirmSubmit}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
