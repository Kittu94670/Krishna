<template>
    <lightning-card title="Create Account (Apex)">
        
        <div class="slds-p-around_medium">
            
            <lightning-input 
                label="Account Name" 
                value={name} 
                onchange={handleName}>
            </lightning-input>

            <lightning-input 
                label="Phone" 
                value={phone} 
                onchange={handlePhone}>
            </lightning-input>

            <br/>

            <lightning-button 
                label="Create Account" 
                variant="brand"
                onclick={handleCreate}>
            </lightning-button>

        </div>

    </lightning-card>
</template>
