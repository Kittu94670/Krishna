<template>
    <lightning-card title="Country Selection">
        <div class="slds-p-around_medium">

           <lightning-combobox
    label="Countries"
    options={countryOptions}
    value={selectedCountry}
    onchange={handleChange}>
</lightning-combobox>



            <lightning-button
    label="Show"
    variant="brand"
    class="slds-m-top_medium"
    onclick={handleShow}>
</lightning-button>


          <c-country-child country-details={selectedCountryDetails}></c-country-child>


        </div>
    </lightning-card>
</template>
