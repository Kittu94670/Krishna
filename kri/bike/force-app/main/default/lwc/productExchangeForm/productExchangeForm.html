<template>
    <lightning-card title="Product Return / Exchange Request" icon-name="standard:case">
        <div class="slds-p-around_medium">

            <!-- Customer Name -->
            <lightning-input type="text" label="Customer Name" value={customerName} disabled></lightning-input>

            <!-- Product -->
            <lightning-combobox 
                name="product"
                label="Product"
                value={selectedProduct}
                placeholder="Select a Product"
                options={productOptions}
                onchange={handleProductChange}>
            </lightning-combobox>

            <!-- Request Type -->
            <lightning-combobox 
                name="requestType"
                label="Request Type"
                value={requestType}
                placeholder="Select Request Type"
                options={requestTypeOptions}
                onchange={handleRequestTypeChange}>
            </lightning-combobox>

            <!-- Reason -->
            <lightning-combobox 
                name="reason"
                label="Reason for Return"
                value={reason}
                placeholder="Select a Reason"
                options={reasonOptions}
                onchange={handleReasonChange}>
            </lightning-combobox>

            <!-- Comments -->
            <lightning-textarea 
                label="Comments / Additional Notes"
                value={comments}
                onchange={handleCommentsChange}>
            </lightning-textarea>

            <!-- Action Buttons -->
            <div class="slds-m-top_medium">
                <lightning-button label="Submit" variant="brand" onclick={handleSubmit}></lightning-button>
                <lightning-button label="Cancel" variant="neutral" class="slds-m-left_small" onclick={handleCancel}></lightning-button>
            </div>
        </div>
    </lightning-card>

    <!-- Return Modal -->
    <template if:true={isReturnModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Confirm Return</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input type="currency" label="Amount Payable" value={amountPayable} disabled></lightning-input>
                    <lightning-combobox 
                        label="Pay To"
                        value={payTo}
                        options={payToOptions}
                        onchange={handlePayToChange}>
                    </lightning-combobox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={handleModalCancel}></lightning-button>
                    <lightning-button variant="brand" label="Confirm" onclick={handleModalConfirm}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Flow -->
    <lightning-flow aura:id="productFlow"></lightning-flow>
</template>
