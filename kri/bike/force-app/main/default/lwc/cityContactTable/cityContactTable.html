<template>
    <lightning-card title="City Wise Contacts" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            <lightning-combobox
                name="cityFilter"
                label="Select City"
                value={selectedCity}
                options={cityOptions}
                onchange={handleCityChange}>
            </lightning-combobox>

            <br/>

            <div style="height: 300px;">
                <lightning-datatable
                    key-field="Id"
                    data={contacts}
                    columns={columns}
                    hide-checkbox-column>
                </lightning-datatable>
            </div>
        </div>
    </lightning-card>
</template>
